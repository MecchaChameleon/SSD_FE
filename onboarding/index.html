<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <title>로컬타임 시작하기</title>
  <link rel="stylesheet" href="./onboarding.css">
</head>
<body>
  <main class="onboarding" data-login-url="../login/index.html" aria-live="polite">
    <section class="screen splash is-active" data-screen="splash" aria-label="로컬타임 시작 화면">
      <div class="brand" aria-label="로컬타임">
        <img class="brand__icon" src="../icon/로컬타임_아이콘 1.svg" alt="">
        <img class="brand__logo" src="../icon/로컬타임_로고1 1.svg" alt="로컬타임">
      </div>
    </section>

    <section class="screen intro" data-screen="0" aria-label="온보딩 1 / 3">
      <div class="illustration-slot" aria-label="여행 상품 추천 일러스트 영역">일러스트 영역</div>
      <div class="intro__copy"><h1>여행 중 만나는 실시간 마감 특가</h1><p>내 위치와 날씨를 기반으로 합리적인 상품 추천</p></div>
      <div class="indicator" aria-hidden="true"><i class="is-on"></i><i></i><i></i></div>
      <button class="next-button" type="button">다음</button>
    </section>

    <section class="screen intro" data-screen="1" aria-label="온보딩 2 / 3">
      <div class="illustration-slot" aria-label="AI 판매 일러스트 영역">일러스트 영역</div>
      <div class="intro__copy"><h1>AI와 함께 똑똑한 판매</h1><p>남은 재고와 마감 시간을 분석하여 최적의 할인율 추천</p></div>
      <div class="indicator" aria-hidden="true"><i></i><i class="is-on"></i><i></i></div>
      <button class="next-button" type="button">다음</button>
    </section>

    <section class="screen intro" data-screen="2" aria-label="온보딩 3 / 3">
      <div class="illustration-slot" aria-label="지역 소비 연결 일러스트 영역">일러스트 영역</div>
      <div class="intro__copy"><h1>지역과 소비를 연결하는 서비스</h1><p>폐기는 줄이고, 합리적인 소비는 늘리고</p></div>
      <div class="indicator" aria-hidden="true"><i></i><i></i><i class="is-on"></i></div>
      <button class="next-button" type="button">다음</button>
    </section>
  </main>
  <script src="./onboarding.js"></script>
</body>
</html>
